 calculator with more confidence. The calculator should support your thinking, not replace it. When you understand the logic behind the result, you make better decisions and avoid preventable mistakes."}]}],cm=[{slug:"how-to-calculate-gst-in-india",title:"How to Calculate GST in India: Step-by-Step Guide (2026)",description:"Learn how to calculate GST in India with simple formulas, real examples and a free online GST calculator. Understand CGST, SGST & IGST easily.",excerpt:"A complete beginner-friendly walkthrough on calculating GST manually and with a calculator, including CGST/SGST/IGST breakdowns.",date:"2026-01-05",readTime:"6 min read",category:"Guides",blocks:[{type:"p",text:"Goods and Services Tax (GST) is an indirect tax levied on the supply of goods and services in India. Whether you're a business owner, freelancer, or shopper, knowing how to calculate GST correctly helps you price products, file returns and avoid billing errors."},{type:"h2",text:"What is GST?"},{type:"p",text:"GST replaced multiple indirect taxes like VAT, service tax and excise duty with a single unified tax structure. It is charged at every stage of the supply chain, but the end consumer bears the final cost."},{type:"h2",text:"The Basic GST Formula"},{type:"p",text:"There are two common scenarios you'll encounter — adding GST to a base price, or extracting GST from a total price that already includes tax."},{type:"ul",items:["GST Amount = (Original Price × GST Rate) / 100","Net Price = Original Price + GST Amount","Original Price (from inclusive amount) = (Total Amount × 100) / (100 + GST Rate)"]},{type:"h3",text:"Example 1: Adding GST (Exclusive)"},{type:"p",text:"Suppose a product costs ₹1,000 before tax and the applicable GST rate is 18%."},{type:"ol",items:["GST Amount = (1000 × 18) / 100 = ₹180","Total Price = 1000 + 180 = ₹1,180"]},{type:"h3",text:"Example 2: Removing GST (Inclusive)"},{type:"p",text:"If a product's sticker price is ₹1,180 and it already includes 18% GST:"},{type:"ol",items:["Original Price = (1180 × 100) / (100 + 18) = ₹1,000","GST Amount = 1180 − 1000 = ₹180"]},{type:"h2",text:"Understanding CGST, SGST & IGST"},{type:"p",text:"For intra-state transactions, GST is split equally between Central GST (CGST) and State GST (SGST). For inter-state transactions, Integrated GST (IGST) applies as a single tax collected by the central government."},{type:"table",headers:["Transaction Type","Tax Applicable","Split"],rows:[["Within same state","CGST + SGST","9% + 9% for 18% slab"],["Between two states","IGST","18% (full rate)"]]},{type:"h2",text:"Use an Online GST Calculator"},{type:"p",text:"Manual calculation works fine, but an online GST calculator saves time and eliminates rounding mistakes. Our free GST Calculator lets you switch between exclusive, inclusive and reverse GST modes instantly, with automatic CGST/SGST breakdowns."},{type:"quote",text:"Tip: Always double-check the GST rate applicable to your product/service category on the official GST portal before invoicing."},{type:"h2",text:"Conclusion"},{type:"p",text:"Calculating GST doesn't have to be complicated. With the right formula — or our free calculator — you can compute accurate tax amounts in seconds and stay compliant with Indian tax regulations."}]},{slug:"gst-inclusive-vs-exclusive",title:"GST Inclusive vs Exclusive Pricing: What's the Difference?",description:"Confused between GST inclusive and exclusive pricing? Understand the difference with examples, formulas, and when to use each method.",excerpt:"Understand exactly how inclusive and exclusive GST pricing differ, with worked examples so you never mix them up again.",date:"2026-01-08",readTime:"5 min read",category:"Guides",blocks:[{type:"p",text:"One of the most common points of confusion for shoppers and business owners alike is the difference between 'GST inclusive' and 'GST exclusive' prices. Getting this wrong can lead to incorrect invoices and unhappy customers."},{type:"h2",text:"What is GST Exclusive Pricing?"},{type:"p",text:"In exclusive pricing, the listed price does NOT include GST. Tax is calculated and added separately at checkout or on the invoice."},{type:"ul",items:["Listed Price: ₹500","GST @ 18%: ₹90","Final Payable Amount: ₹590"]},{type:"h2",text:"What is GST Inclusive Pricing?"},{type:"p",text:"In inclusive pricing, the displayed price already contains the GST component. The seller must back-calculate the base price and tax portion for their records."},{type:"ul",items:["Listed (Final) Price: ₹590","Base Price = (590 × 100) / 118 = ₹500","GST Portion = 590 − 500 = ₹90"]},{type:"h2",text:"Why Does the Difference Matter?"},{type:"p",text:"Retail businesses (B2C) typically show inclusive prices to keep things simple for customers, whereas B2B invoices usually show exclusive prices with GST itemised separately for input tax credit (ITC) purposes."},{type:"table",headers:["Aspect","Exclusive Pricing","Inclusive Pricing"],rows:[["Common use case","B2B invoices","Retail / MRP labels"],["Customer sees","Base price + tax separately","One final price"],["ITC claim clarity","High","Requires back-calculation"]]},{type:"h2",text:"How Our Calculator Helps"},{type:"p",text:"Our GST Calculator has dedicated tabs for both modes — simply enter your amount, pick the rate, and instantly see the original amount, GST amount and total, without manual formulas."},{type:"h2",text:"Conclusion"},{type:"p",text:"Both pricing methods arrive at the same total value; the difference lies in when and how the tax is shown. Understanding this helps you invoice correctly and interpret prices as a consumer."}]},{slug:"gst-rates-explained",title:"GST Rates in India Explained: 0%, 5%, 12%, 18% & 28% Slabs",description:"Complete breakdown of GST tax slabs in India — 0%, 3%, 5%, 12%, 18% and 28% — with examples of goods and services under each rate.",excerpt:"A full breakdown of every GST rate slab in India and which goods & services fall under each category.",date:"2026-01-11",readTime:"7 min read",category:"Rates",blocks:[{type:"p",text:"India follows a multi-tier GST rate structure designed to keep essential items affordable while taxing luxury and sin goods at higher rates. Here's a complete breakdown of every slab."},{type:"h2",text:"0% GST Slab (Nil Rated)"},{type:"p",text:"Essential items are exempt from GST to keep them affordable for all income groups."},{type:"ul",items:["Fresh fruits and vegetables","Milk, curd and unbranded natural honey","Educational services","Healthcare services"]},{type:"h2",text:"3% GST Slab"},{type:"p",text:"A special reduced rate primarily applicable to precious metals."},{type:"ul",items:["Gold, silver and platinum jewellery","Rough precious and semi-precious stones"]},{type:"h2",text:"5% GST Slab"},{type:"p",text:"Applies to essential goods and mass-consumption items."},{type:"ul",items:["Packaged food items","Life-saving drugs","Economy class air travel","Coal"]},{type:"h2",text:"12% GST Slab"},{type:"p",text:"A moderate rate for standard goods and services."},{type:"ul",items:["Processed foods","Business class air travel","Mobile phones","Ayurvedic medicines"]},{type:"h2",text:"18% GST Slab"},{type:"p",text:"The most common slab, covering the majority of goods and services."},{type:"ul",items:["IT and software services","Financial services","Restaurants (non-AC in some cases)","Most electronics and consumer goods"]},{type:"h2",text:"28% GST Slab"},{type:"p",text:"Reserved for luxury items and 'sin' goods, often with an additional cess."},{type:"ul",items:["Automobiles","Tobacco and pan masala","Aerated drinks","Luxury items"]},{type:"table",headers:["Slab","Category","Example"],rows:[["0%","Essentials","Milk, vegetables"],["3%","Precious metals","Gold jewellery"],["5%","Mass consumption","Packaged food"],["12%","Standard goods","Mobile phones"],["18%","Most goods/services","Electronics, IT services"],["28%","Luxury/sin goods","Cars, tobacco"]]},{type:"h2",text:"How to Quickly Apply the Right Rate"},{type:"p",text:"Use our GST Calculator's rate selector to instantly switch between all six slabs and see the tax impact on your amount in real time — no manual lookup tables needed."}]},{slug:"reverse-gst-calculator-guide",title:"Reverse GST Calculator Guide: Extract Base Price from Total",description:"Learn how a reverse GST calculator works, the exact formula used, and how to extract the original price and tax from a GST-inclusive total.",excerpt:"Everything you need to know about reverse GST calculations — formula, use-cases and a free tool to do it instantly.",date:"2026-01-14",readTime:"5 min read",category:"Guides",blocks:[{type:"p",text:"Sometimes you only know the final price a customer paid and need to work backward to find the original (pre-tax) price. This is where a reverse GST calculator comes in handy."},{type:"h2",text:"What is Reverse GST Calculation?"},{type:"p",text:"Reverse GST calculation means extracting the base price and the GST component from a total amount that already includes tax — essentially the same math as 'GST inclusive' but framed from the perspective of decomposing a bill."},{type:"h2",text:"The Formula"},{type:"ul",items:["Base Price = (Total Amount × 100) / (100 + GST Rate)","GST Amount = Total Amount − Base Price"]},{type:"h3",text:"Worked Example"},{type:"p",text:"A restaurant bill shows a final amount of ₹2,360 including 18% GST. To find the base amount:"},{type:"ol",items:["Base Price = (2360 × 100) / 118 = ₹2,000","GST Amount = 2360 − 2000 = ₹360"]},{type:"h2",text:"When Do You Need This?"},{type:"ul",items:["Verifying vendor invoices for correctness","Filing GST returns where you only have the total transaction value","Auditing expense receipts","Comparing prices across GST-inclusive and exclusive listings"]},{type:"h2",text:"Try It Instantly"},{type:"p",text:"Our Reverse GST Calculator tab does this math for you in real time — just type the final amount, choose the rate, and get the base price and tax breakdown instantly, including CGST/SGST split."},{type:"h2",text:"Common Mistakes to Avoid"},{type:"ul",items:["Multiplying the total by the GST rate directly (this overstates tax)","Forgetting that CGST + SGST together equal the full GST rate","Using the wrong slab for the product/service category"]}]},{slug:"gst-formula",title:"GST Formula: The Complete Mathematical Reference",description:"All GST formulas in one place — exclusive, inclusive, reverse GST, CGST/SGST split and net price calculations with examples.",excerpt:"A concise cheat-sheet of every GST formula you'll ever need, from basic tax addition to CGST/SGST splits.",date:"2026-01-17",readTime:"4 min read",category:"Formulas",blocks:[{type:"p",text:"Whether you're a student, accountant or business owner, having all GST formulas handy saves time. Here's a complete reference sheet."},{type:"h2",text:"1. Adding GST (Exclusive → Inclusive)"},{type:"ul",items:["GST Amount = (Original Price × GST%) / 100","Total Price = Original Price + GST Amount"]},{type:"h2",text:"2. Removing GST (Inclusive → Exclusive)"},{type:"ul",items:["Original Price = (Total Price × 100) / (100 + GST%)","GST Amount = Total Price − Original Price"]},{type:"h2",text:"3. CGST & SGST Split (Intra-state)"},{type:"ul",items:["CGST = GST Amount / 2","SGST = GST Amount / 2"]},{type:"h2",text:"4. IGST (Inter-state)"},{type:"p",text:"IGST = full GST Amount (not split), applicable when the buyer and seller are in different states."},{type:"h2",text:"5. Effective Tax Rate"},{type:"p",text:"Effective Rate % = (Total GST Paid / Original Price) × 100 — useful when multiple cess or surcharges apply on top of the base rate."},{type:"h2",text:"Quick Reference Table"},{type:"table",headers:["Goal","Formula"],rows:[["Add GST","Base × (1 + rate/100)"],["Remove GST","Total × 100 / (100 + rate)"],["Find GST only","Base × rate / 100"],["Find CGST","GST amount / 2"]]},{type:"h2",text:"Use the Calculator Instead of Manual Math"},{type:"p",text:"While these formulas are simple, manual calculation is error-prone at scale. Use our free online GST Calculator to apply any of these formulas instantly and accurately."}]},{slug:"gst-for-small-businesses",title:"GST for Small Businesses: A Practical Survival Guide",description:"Everything small business owners in India need to know about GST registration, filing, input tax credit and staying compliant.",excerpt:"Practical, no-nonsense GST guidance tailored for small business owners and startups in India.",date:"2026-01-20",readTime:"8 min read",category:"Business",blocks:[{type:"p",text:"GST compliance can feel overwhelming for small business owners, but breaking it down into manageable steps makes it far less intimidating."},{type:"h2",text:"Do You Need to Register for GST?"},{type:"p",text:"GST registration is mandatory if your annual turnover exceeds ₹40 lakh for goods (₹20 lakh for services in most states), or if you sell across state lines, sell on e-commerce platforms, or are otherwise required by law."},{type:"h2",text:"Key Compliance Steps"},{type:"ol",items:["Register on the GST portal and obtain your GSTIN","Issue GST-compliant invoices for every sale","Maintain purchase and sales records diligently","File monthly/quarterly returns (GSTR-1, GSTR-3B) on time","Reconcile Input Tax Credit (ITC) regularly","Pay any tax liability before the due date to avoid interest"]},{type:"h2",text:"Understanding Input Tax Credit (ITC)"},{type:"p",text:"ITC allows you to reduce the tax you owe on sales by the amount of GST you've already paid on business purchases. Keeping clean, itemised invoices is essential to claim ITC without disputes."},{type:"h2",text:"Composition Scheme for Small Businesses"},{type:"p",text:"Businesses with turnover below ₹1.5 crore can opt for the Composition Scheme, paying a flat, lower tax rate with simplified quarterly filing — but they cannot claim ITC or charge GST separately on invoices."},{type:"h2",text:"Pricing Your Products Correctly"},{type:"p",text:"Use a GST calculator when setting prices to ensure you're neither undercharging (hurting margins) nor overcharging (risking customer trust). Decide upfront whether your listed price will be GST inclusive or exclusive."},{type:"h2",text:"Common Mistakes Small Businesses Make"},{type:"ul",items:["Missing filing deadlines and accumulating late fees","Not reconciling ITC with GSTR-2B","Charging the wrong GST rate for their product category","Poor invoice record-keeping"]},{type:"h2",text:"Final Thoughts"},{type:"p",text:"Treat GST compliance as an ongoing habit rather than a once-a-year task. Set calendar reminders for filing dates and use tools — like our free GST calculator — to keep your day-to-day pricing accurate."}]},{slug:"gst-invoice-guide",title:"GST Invoice Guide: Format, Mandatory Fields & Free Checklist",description:"Learn what a GST-compliant invoice must include, see a sample format, and download a checklist to avoid compliance issues.",excerpt:"Learn exactly what fields a valid GST invoice needs and avoid common compliance mistakes.",date:"2026-01-23",readTime:"6 min read",category:"Business",blocks:[{type:"p",text:"A GST invoice is more than a bill — it's a legal document required for tax compliance and Input Tax Credit claims. Missing even one mandatory field can create problems during audits."},{type:"h2",text:"Mandatory Fields on a GST Invoice"},{type:"ul",items:["Invoice number and date (sequential, unique per financial year)","Supplier's name, address and GSTIN","Recipient's name, address and GSTIN (if registered)","HSN/SAC code for goods/services","Description, quantity and unit of goods/services","Taxable value of goods/services","Applicable GST rate and amount (CGST, SGST or IGST shown separately)","Place of supply (for inter-state transactions)","Signature of the supplier or authorised representative"]},{type:"h2",text:"Sample GST Invoice Breakdown"},{type:"table",headers:["Field","Example"],rows:[["Invoice No.","INV-2026-0142"],["Taxable Value","₹10,000"],["CGST @ 9%","₹900"],["SGST @ 9%","₹900"],["Total Invoice Value","₹11,800"]]},{type:"h2",text:"Types of GST Invoices"},{type:"ul",items:["Tax Invoice — issued by regular registered taxpayers","Bill of Supply — issued by composition scheme dealers or for exempt goods","Revised Invoice — issued to correct an earlier invoice","Credit/Debit Note — issued for returns or price adjustments"]},{type:"h2",text:"Quick Compliance Checklist"},{type:"ol",items:["Is the invoice numbered sequentially?","Is the correct GSTIN of both parties mentioned?","Is the HSN/SAC code accurate for the item category?","Is the GST rate correct and matched to the item?","Is CGST/SGST or IGST applied based on the place of supply?"]},{type:"h2",text:"Calculate Invoice Totals Instantly"},{type:"p",text:"Use our GST calculator's exclusive mode while drafting invoices — enter the taxable value and rate to instantly get the CGST, SGST and total invoice value."}]},{slug:"gst-examples",title:"15 Real-Life GST Calculation Examples (With Answers)",description:"Practice GST calculations with 15 real-world worked examples covering exclusive, inclusive and reverse GST scenarios.",excerpt:"Sharpen your GST maths skills with a set of practical worked examples across every calculation type.",date:"2026-01-26",readTime:"7 min read",category:"Examples",blocks:[{type:"p",text:"Nothing beats learning by example. Below are common, real-world GST calculation scenarios with full step-by-step answers."},{type:"h2",text:"Exclusive GST Examples"},{type:"ol",items:["₹2,000 @ 5% → GST = ₹100, Total = ₹2,100","₹15,000 @ 12% → GST = ₹1,800, Total = ₹16,800","₹8,500 @ 18% → GST = ₹1,530, Total = ₹10,030","₹50,000 @ 28% → GST = ₹14,000, Total = ₹64,000","₹1,20,000 @ 18% → GST = ₹21,600, Total = ₹1,41,600"]},{type:"h2",text:"Inclusive GST Examples"},{type:"ol",items:["₹2,100 incl. 5% → Base = ₹2,000, GST = ₹100","₹16,800 incl. 12% → Base = ₹15,000, GST = ₹1,800","₹10,030 incl. 18% → Base = ₹8,500, GST = ₹1,530","₹64,000 incl. 28% → Base = ₹50,000, GST = ₹14,000","₹11,800 incl. 18% → Base = ₹10,000, GST = ₹1,800"]},{type:"h2",text:"Reverse GST Examples"},{type:"ol",items:["Total bill ₹3,540 at 18% → Base = ₹3,000, Tax = ₹540","Total bill ₹1,180 at 18% → Base = ₹1,000, Tax = ₹180","Total bill ₹5,250 at 5% → Base = ₹5,000, Tax = ₹250","Total bill ₹22,400 at 12% → Base = ₹20,000, Tax = ₹2,400","Total bill ₹64,000 at 28% → Base = ₹50,000, Tax = ₹14,000"]},{type:"h2",text:"Try These Yourself"},{type:"p",text:"Plug any of the amounts above into our free GST Calculator to instantly verify the answers, or try your own numbers to build confidence with the formulas."}]},{slug:"gst-faqs",title:"GST FAQs: 20 Most Common Questions Answered",description:"Quick answers to the most frequently asked GST questions in India — registration, rates, filing, refunds and more.",excerpt:"Straight-to-the-point answers to the 20 GST questions people search for most.",date:"2026-01-29",readTime:"9 min read",category:"FAQs",blocks:[{type:"h2",text:"General Questions"},{type:"h3",text:"1. What does GST stand for?"},{type:"p",text:"Goods and Services Tax — a single, unified indirect tax on the supply of goods and services in India."},{type:"h3",text:"2. When was GST introduced in India?"},{type:"p",text:"GST was implemented across India on 1 July 2017."},{type:"h3",text:"3. What taxes did GST replace?"},{type:"p",text:"VAT, service tax, excise duty, entry tax and several other state and central indirect taxes."},{type:"h2",text:"Rates & Calculation"},{type:"h3",text:"4. What are the current GST slabs?"},{type:"p",text:"0%, 3%, 5%, 12%, 18% and 28%, with some luxury/sin goods attracting additional cess."},{type:"h3",text:"5. How do I calculate GST manually?"},{type:"p",text:"GST Amount = (Base Price × Rate) / 100. For inclusive amounts, Base = (Total × 100) / (100 + Rate)."},{type:"h3",text:"6. What is the difference between CGST, SGST and IGST?"},{type:"p",text:"CGST and SGST apply equally within a single state; IGST applies to inter-state transactions and is collected by the central government."},{type:"h2",text:"Registration"},{type:"h3",text:"7. Who needs to register for GST?"},{type:"p",text:"Businesses exceeding the turnover threshold (₹40 lakh for goods, ₹20 lakh for services in most states) or engaged in inter-state supply/e-commerce."},{type:"h3",text:"8. Is GST registration free?"},{type:"p",text:"Yes, registering on the official GST portal does not involve any government fee."},{type:"h2",text:"Filing & Payment"},{type:"h3",text:"9. What returns do I need to file?"},{type:"p",text:"Most regular taxpayers file GSTR-1 (outward supplies) and GSTR-3B (summary return) monthly or quarterly, plus an annual return (GSTR-9)."},{type:"h3",text:"10. What happens if I miss a filing deadline?"},{type:"p",text:"Late fees and interest accrue on outstanding tax liability, and your GSTIN could eventually be suspended for prolonged non-compliance."},{type:"h2",text:"Input Tax Credit"},{type:"h3",text:"11. What is Input Tax Credit (ITC)?"},{type:"p",text:"ITC lets you offset GST paid on business purchases against GST collected on sales, reducing your net tax liability."},{type:"h3",text:"12. Can I claim ITC on all purchases?"},{type:"p",text:"No — certain items like personal use goods, motor vehicles (with exceptions) and certain food/beverage services are blocked from ITC."},{type:"h2",text:"Refunds & Composition"},{type:"h3",text:"13. How do I claim a GST refund?"},{type:"p",text:"Refunds (e.g., for exports or excess tax paid) are claimed online via the GST portal using form RFD-01."},{type:"h3",text:"14. What is the Composition Scheme?"},{type:"p",text:"A simplified scheme for small businesses (turnover under ₹1.5 crore) to pay tax at a flat, lower rate with reduced compliance."},{type:"h2",text:"Miscellaneous"},{type:"h3",text:"15. Is GST applicable on exports?"},{type:"p",text:"Exports are treated as zero-rated supplies — no GST is charged, and exporters can claim a refund of input taxes."},{type:"h3",text:"16. Do freelancers need to charge GST?"},{type:"p",text:"Yes, if their annual turnover exceeds the applicable threshold or they supply services inter-state."},{type:"h3",text:"17. Can GST rates change?"},{type:"p",text:"Yes, the GST Council periodically revises rates for various goods and services."},{type:"h3",text:"18. What is an e-way bill?"},{type:"p",text:"A document required for transporting goods worth over a specified value, generated electronically on the GST portal."},{type:"h3",text:"19. Is GST calculator accurate for legal filing?"},{type:"p",text:"Our calculator is a helpful estimation tool for pricing and learning; always confirm final figures with your accountant for statutory filings."},{type:"h3",text:"20. Where can I calculate GST for free?"},{type:"p",text:"Right here! Use our free GST Calculator for instant, accurate GST Exclusive, Inclusive and Reverse calculations."}]},{slug:"latest-gst-rules",title:"Latest GST Rules & Updates in India (2026 Edition)",description:"Stay up to date with the latest GST rule changes, compliance updates and e-invoicing requirements in India for 2026.",excerpt:"A roundup of the most important recent GST rule changes every taxpayer and business owner should know.",date:"2026-02-02",readTime:"6 min read",category:"News",blocks:[{type:"p",text:"GST rules evolve frequently as the GST Council meets to refine rates, compliance requirements and technology mandates. Here's a summary of key recent trends and updates to stay informed about."},{type:"h2",text:"1. Mandatory E-Invoicing Expansion"},{type:"p",text:"E-invoicing thresholds have been progressively lowered, bringing more small and mid-sized businesses under mandatory electronic invoice generation via the Invoice Registration Portal (IRP)."},{type:"h2",text:"2. Stricter ITC Matching"},{type:"p",text:"Input Tax Credit claims are increasingly auto-populated and matched against GSTR-2B, meaning credit is more strictly tied to your suppliers' timely and accurate filings."},{type:"h2",text:"3. Rate Rationalisation Discussions"},{type:"p",text:"The GST Council periodically reviews the multi-slab structure, with ongoing discussions about merging certain slabs to simplify compliance — always check official notifications for the latest applicable rate on your goods/services."},{type:"h2",text:"4. Enhanced E-Way Bill & E-Invoice Integration"},{type:"p",text:"E-way bill generation is now more tightly linked with e-invoice data, reducing duplicate data entry but requiring accurate invoice details upfront."},{type:"h2",text:"5. Sector-Specific Clarifications"},{type:"p",text:"The government regularly issues clarifications for sectors like online gaming, casinos, real estate, and hospitality, given their distinct valuation rules and applicable cess."},{type:"h2",text:"6. Late Fee Rationalisation"},{type:"p",text:"Late fees for delayed GSTR-1/3B filings have seen periodic caps and reductions for small taxpayers to ease compliance burden — check current notifications for applicable limits."},{type:"h2",text:"How to Stay Compliant"},{type:"ul",items:["Subscribe to official GST portal notifications","Reconcile your books with GSTR-2B every month","Use updated GST rates in your invoicing and pricing tools","Consult a tax professional for sector-specific rulings"]},{type:"h2",text:"Disclaimer"},{type:"p",text:"GST rules change periodically. This article is for general informational purposes only — always verify the latest rates and rules on the official GST portal (gst.gov.in) or with a qualified tax professional before making compliance decisions."}]},{slug:"percentage-calculator-guide",title:"Percentage Calculator Guide: How to Calculate % in 3 Easy Ways",description:"Master percentage calculations — find X% of Y, what percent X is of Y, and percentage increase/decrease with formulas and examples.",excerpt:"Complete guide to percentage calculations with real-life examples for school, business and everyday use.",date:"2026-02-10",readTime:"5 min read",category:"Maths",blocks:[{type:"p",text:"Percentage is one of the most used concepts in daily life — from discounts to marks, GST to profit margins. Yet many get confused between different percentage problems."},{type:"h2",text:"1. What is X% of Y?"},{type:"p",text:"Formula: (X/100) * Y. Example: 18% of 2000 = (18/100)*2000 = 360. This is exactly how GST is calculated in exclusive mode."},{type:"h2",text:"2. X is what % of Y?"},{type:"p",text:"Formula: (X/Y)*100. Example: If you scored 360 out of 500, percentage = (360/500)*100 = 72%."},{type:"h2",text:"3. Percentage Increase / Decrease"},{type:"p",text:"Formula: ((New - Old)/Old)*100. If price goes from 500 to 650, increase = ((650-500)/500)*100 = 30%."},{type:"h2",text:"Quick Tips"},{type:"ul",items:["Use our percentage calculator to avoid manual errors","For GST: 18% of 1000 is same as 0.18*1000 = 180","Reverse % is opposite — use reverse percentage calculator for that"]}]},{slug:"reverse-percentage-calculator-explained",title:"Reverse Percentage Calculator: Find Original Value Before %",description:"Learn how reverse percentage works to find original price before tax, discount or increase — with formula and GST connection.",excerpt:"Understand reverse percentage calculation to find original values before discounts and taxes.",date:"2026-02-12",readTime:"5 min read",category:"Maths",blocks:[{type:"p",text:"Reverse percentage is crucial when you know the final value after a % increase or decrease and need to find the starting value."},{type:"h2",text:"Case 1: Value after % Increase"},{type:"p",text:"If final = original + P%, then original = final / (1 + P/100). Example: You paid 1100 after 10% hike. Original = 1100/1.10 = 1000."},{type:"h2",text:"Case 2: Value is P% of Total"},{type:"p",text:"If 250 is 25% of total, total = 250*100/25 = 1000. This is used for finding base price from GST inclusive amounts."},{type:"h2",text:"Real Uses in India"},{type:"ul",items:["Find original MRP before discount","Find taxable value from GST inclusive bill","Back-calculate salary before increment"]}]},{slug:"discount-calculator-tips",title:"Discount Calculator: How to Calculate Sale Price & Savings (India)",description:"Calculate discount price instantly — learn formula, how to reverse find MRP, and difference between discount and profit margin.",excerpt:"Everything about discount calculation for shoppers and shopkeepers with practical Indian examples.",date:"2026-02-14",readTime:"4 min read",category:"Shopping",blocks:[{type:"p",text:"Sales like 20% OFF are everywhere. Knowing real savings needs correct discount math."},{type:"h2",text:"Discount Formula"},{type:"ul",items:["Discount Amount = (MRP × Discount%)/100","Sale Price = MRP - Discount Amount"]},{type:"h2",text:"Example"},{type:"p",text:"MRP ₹2000, 25% off → Discount = (2000×25)/100 = 500, Sale = 1500. You save ₹500."},{type:"h2",text:"Reverse Discount"},{type:"p",text:"If sale is ₹1500 after 25% off, MRP = 1500/(1-25/100)=1500/0.75=₹2000. Use reverse % calculator for this."}]},{slug:"profit-margin-formula-india",title:"Profit Margin Calculator Guide: Markup vs Margin for Small Business",description:"Learn profit margin calculation — difference between markup and margin, formulas, and pricing tips for Indian businesses.",excerpt:"Understand profit, markup and margin % to price products correctly including GST.",date:"2026-02-16",readTime:"5 min read",category:"Business",blocks:[{type:"p",text:"For any business, knowing profit % is essential for pricing. Two terms confuse people: markup and margin."},{type:"h2",text:"Formulas"},{type:"ul",items:["Profit = Selling - Cost","Markup % = (Profit/Cost)*100 (on cost)","Margin % = (Profit/Selling)*100 (on sale)"]},{type:"h2",text:"Example"},{type:"p",text:"Cost ₹500, Sell ₹750 → Profit ₹250, Markup 50%, Margin 33.33%. If you add 18% GST on selling price, invoice = ₹885."},{type:"h2",text:"Tip"},{type:"p",text:"Use profit margin calculator to experiment — aim for margin that covers GST, delivery and leaves net profit."}]},{slug:"age-calculator-guide-india",title:"Age Calculator: How to Calculate Exact Age in Years, Months & Days",description:"Free guide to age calculation — manual method, leap year handling and why exact age matters for Indian documents.",excerpt:"Learn exact age calculation method used for school admissions, govt forms and retirement.",date:"2026-02-18",readTime:"4 min read",category:"Utility",blocks:[{type:"p",text:"Exact age in years-months-days is needed for school admission, passport, pensions and insurance in India."},{type:"h2",text:"Manual Method"},{type:"p",text:"Subtract birth year from current year, then adjust months and days. If today's day < birth day, borrow days from previous month."},{type:"h2",text:"Why Use Online Calculator?"},{type:"ul",items:["Handles leap years automatically","Gives total days lived, total months, next birthday countdown","Instant and error-free"]}]},{slug:"emi-calculator-guide-india",title:"EMI Calculator Explained: How Home & Personal Loan EMIs Work",description:"Understand EMI calculation formula, amortization, how tenure vs interest affects EMI — with examples for home, car, personal loans India.",excerpt:"Complete EMI guide — formula, factors, tips to reduce interest and compare loans.",date:"2026-02-20",readTime:"6 min read",category:"Finance",blocks:[{type:"p",text:"EMI is fixed monthly payment to repay a loan. It has two parts: principal and interest."},{type:"h2",text:"EMI Formula"},{type:"p",text:"EMI = [P × R × (1+R)^N]/[(1+R)^N -1], where P principal, R monthly rate (annual/12/100), N months."},{type:"h2",text:"Example"},{type:"p",text:"Loan ₹20 lakh, 8.5% for 20 years → EMI ≈ ₹17,356, Total interest ≈ ₹21.6 lakh, Total payable ≈ ₹41.6 lakh."},{type:"h2",text:"Tips to Reduce Interest"},{type:"ul",items:["Choose shorter tenure if EMI affordable","Make part-prepayments annually","Compare effective rate, not just nominal","Improve credit score for lower rate"]}]},{slug:"loan-calculator-guide",title:"Loan Calculator Guide: How to Compare Home, Car & Personal Loans",description:"Loan calculator guide for India — total interest vs principal, amortization and how to choose best loan offer.",excerpt:"Learn how to use loan calculator to compare offers and plan repayments.",date:"2026-02-22",readTime:"5 min read",category:"Finance",blocks:[{type:"p",text:"Before taking any loan, calculate total cost of borrowing, not just EMI."},{type:"h2",text:"What Loan Calculator Shows"},{type:"ul",items:["Monthly EMI","Total interest payable","Total amount payable","Principal vs Interest split"]},{type:"h2",text:"Example Comparison"},{type:"p",text:"₹5L loan for 5 years at 11% → EMI ₹10871, Interest ₹1.52L, Total ₹6.52L. At 13% → EMI ₹11377, Interest ₹1.82L, difference ₹30k more."}]},{slug:"sip-calculator-guide-india",title:"SIP Calculator Guide: How Mutual Fund SIP Returns Work in India",description:"Understand SIP returns — formula, power of compounding, rupee cost averaging and how to plan goals with SIP calculator.",excerpt:"Learn SIP calculation and wealth creation with long-term consistent investing.",date:"2026-02-24",readTime:"6 min read",category:"Investment",blocks:[{type:"p",text:"SIP helps create big corpus via small monthly investments in mutual funds, averaging market volatility."},{type:"h2",text:"SIP Formula"},{type:"p",text:"FV = P × (((1+r)^n -1)/r) × (1+r) where P monthly amount, r monthly return, n months."},{type:"h2",text:"Example"},{type:"p",text:"SIP ₹5000 for 15 years at 12% → Invested ₹9L, Returns ≈ ₹16.5L, Maturity ≈ ₹25.5L."},{type:"h2",text:"Why Start Early"},{type:"p",text:"Due to compounding, early 5 years matter huge. Starting at 25 vs 35 can double final corpus."}]},{slug:"fd-calculator-guide-india",title:"FD Calculator: How Fixed Deposit Interest Works with Quarterly Compounding",description:"Learn FD calculation in India — quarterly compounding impact, TDS, comparison with SIP and best FD rates 2026.",excerpt:"Understand FD maturity calculation and how compounding frequency affects returns.",date:"2026-02-26",readTime:"5 min read",category:"Investment",blocks:[{type:"p",text:"Fixed Deposit is safest investment in India with guaranteed returns."},{type:"h2",text:"FD Maturity Formula"},{type:"p",text:"A = P (1 + r/n)^(n*t) where r=annual rate/100, n=compounding per year (4 for quarterly), t=years."},{type:"h2",text:"Example"},{type:"p",text:"₹1L at 7.5% for 5 years quarterly → Maturity ≈ ₹1,44,994 interest ₹44,994."},{type:"h2",text:"FD vs SIP"},{type:"ul",items:["FD safe, 6-8% guaranteed, taxable","SIP market-linked, 10-14% expected long-term but not guaranteed","Choose FD for emergency fund, SIP for long goals"]}]},{slug:"qr-code-generator-guide",title:"QR Code Generator Guide: Create Free QR for UPI, URL & WiFi",description:"Learn how to create QR codes for UPI payments, website links, WiFi, text — usage ideas for shops, bills and marketing India.",excerpt:"Complete guide to QR code creation for business and personal use.",date:"2026-02-28",readTime:"4 min read",category:"Utility",blocks:[{type:"p",text:"QR codes are everywhere — payments, menus, visiting cards. Creating your own QR is easy."},{type:"h2",text:"Types"},{type:"ul",items:["URL QR: link to website / Instagram","UPI QR: upi://pay?pa=yourupi@okaxis&pn=Name","Text QR: address, message","WiFi QR: WIFI:T:WPA;S:SSID;P:password;;"]},{type:"h2",text:"Business Uses"},{type:"ul",items:["Print UPI QR on shop counter for payments","QR on invoice linking to GSTIN verification","QR on visiting card for contact saving","Menu QR for restaurants"]}]}],ko=[...cm,...Yb];function _b(r){return ko.find(u=>u.slug===r)}const Pb=[{icon:"⚡",title:"Instant & Real-Time",desc:"Results update live as you type — no button clicks, no delays."},{icon:"🇮🇳",title:"Built for India",desc:"Supports all official GST slabs: 0%, 3%, 5%, 12%, 18% and 28%."},{icon:"🌗",title:"Light & Dark Mode",desc:"Easy on the eyes, day or night, with a single click."},{icon:"📱",title         var redirect = new URLSearchParams(window.location.search).get("redirect");
        if (redirect) {
          window.history.replaceState(null, "", redirect);
        }
      })();
    </script>
